<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <main>

        <nav>
            <img class="logo" src="pokemon-logo.png" alt="">
            <i class="ri-menu-fill"></i>
        </nav>

        <div class="left"></div>
        <div class="right"></div>

        <div class="content">
            <h4>POKEMON GEN I</h4>

            <h1>Pikachu</h1>

            <p>
                Pikachu is an Electric-type Pokémon introduced
                in Generation I. Pikachu are small,<br> chubby,
                and incredibly cute<br> mouse-like Pokémon.
            </p>

            <div class="count">
                <div class="line"></div>
                <span>01 / 08</span>
            </div>
        </div>

        <img class="pikachu" src="pikachu.png" alt="">

        <div class="dots">
            <div class="dot"></div>
            <div class="dot" id="dot1"></div>
            <div class="dot" id="dot2"></div>
            <div class="dot" id="dot3"></div>
            <div class="dot" id="dot4"></div>
        </div>

    </main>
</body>

</html>
