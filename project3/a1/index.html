<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Card</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
    <section class="main">

        <div class="top">

            <h2>Explore Art Work</h2>

            <p>See All</p>

        </div>


        <div class="cards-container">

            <div class="card">

                <img src="/assets/img1.png" alt="">

                <div class="card-info">

                    <div class="text">
                        <h3>Monocular</h3>
                        <span>54.8k</span>
                    </div>

                    <i class="ri-heart-line"></i>

                </div>

                <button>Place Bid</button>

            </div>


            <div class="card">

                <img src="/assets/img2.png" alt="">

                <div class="card-info">

                    <div class="text">
                        <h3>Horns Mask</h3>
                        <span>32.4k</span>
                    </div>

                    <i class="ri-heart-line"></i>

                </div>

                <button>Place Bid</button>

            </div>


            <div class="card">

                <img src="/assets/img3.png" alt="">

                <div class="card-info">

                    <div class="text">
                        <h3>Light Moon</h3>
                        <span>88.6k</span>
                    </div>

                    <i class="ri-heart-line"></i>

                </div>

                <button>Place Bid</button>

            </div>


            <div class="card">

                <img src="/assets/img4.png" alt="">

                <div class="card-info">

                    <div class="text">
                        <h3>Skull Wire</h3>
                        <span>78.9k</span>
                    </div>

                    <i class="ri-heart-line"></i>

                </div>

                <button>Place Bid</button>

            </div>


            <div class="card">

                <img src="/assets/img5.png" alt="">

                <div class="card-info">

                    <div class="text">
                        <h3>Spiderman</h3>
                        <span>24.8k</span>
                    </div>

                    <i class="ri-heart-line"></i>

                </div>

                <button>Place Bid</button>

            </div>


            <div class="card">

                <img src="/assets/img6.png" alt="">

                <div class="card-info">

                    <div class="text">
                        <h3>DeadPool</h3>
                        <span>59.7k</span>
                    </div>

                    <i class="ri-heart-line"></i>

                </div>

                <button>Place Bid</button>

            </div>


            <div class="card">

                <img src="assets/img7.png" alt="">

                <div class="card-info">

                    <div class="text">
                        <h3>White Eye</h3>
                        <span>45.7k</span>
                    </div>

                    <i class="ri-heart-line"></i>

                </div>

                <button>Place Bid</button>

            </div>


            <div class="card">

                <img src="/assets/img8.png" alt="">

                <div class="card-info">

                    <div class="text">
                        <h3>Plastic Spinal</h3>
                        <span>98.6k</span>
                    </div>

                    <i class="ri-heart-line"></i>

                </div>

                <button>Place Bid</button>

            </div>

        </div>

    </section>
</body>

</html>
